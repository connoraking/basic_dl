dataset:
  name: cifar10
  data_dir: ./data
  augmentation: flip_crop
  train_fraction: 0.9
  num_workers: 2

model:
  name: custom_cnn
  activation: relu
  conv1_filters: 64
  conv2_filters: 128
  conv3_filters: 256
  kernel_size: 3
  dropout: 0.1
  classifier_hidden_dim: 256

training:
  batch_size: 128
  learning_rate: 0.001
  epochs: 50
  optimizer: adam
  early_stopping: true
  patience: 5
  min_delta: 0.001

notes: baseline run