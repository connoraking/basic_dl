dataset:
  name: cifar10
  data_dir: ./data
  augmentation: flip_crop
  train_fraction: 0.9
  num_workers: 2

model:
  name: resnet18

training:
  batch_size: 128
  learning_rate: 0.001
  epochs: 20
  optimizer: adam
  early_stopping: true
  patience: 5
  min_delta: 0.001
  show_plot: true
  save_plot: true

notes: resnet18 baseline on cifar10